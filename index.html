<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-ORBIT — Shutdown Notice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
    }

    .logo {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.3em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.15;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #444;
      margin: 2rem auto;
    }

    .status {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ccc;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    p {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.9;
      letter-spacing: 0.04em;
    }

    .divider-bottom {
      width: 30px;
      height: 1px;
      background: #222;
      margin: 2.5rem auto;
    }

    .notice {
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">X-ORBIT</div>

    <div class="divider"></div>

    <div class="status">Service Terminated</div>

    <h1>X-ORBIT has been shut down.</h1>

    <p>
      This service is no longer operational and will not be returning in the foreseeable future.
      We appreciate everyone who was part of this journey.
    </p>

    <div class="divider-bottom"></div>

    <div class="notice">Thank you &mdash; it's been a ride.</div>
  </div>
</body>
</html>
